<!DOCTYPE html>
<html lang="en">
<head>

    <meta property="og:image" content="https://aprcleav.github.io/wdd231/chamber/images/hero.webp">
    <meta property="og:url" content="https://aprcleav.github.io/wdd231/chamber/directory">
    <link rel="stylesheet" href="https://aprcleav.github.io/wdd231/chamber/styles/normalize.css">
    <link rel="stylesheet" href="https://aprcleav.github.io/wdd231/chamber/styles/small.css">
    <link rel="stylesheet" href="https://aprcleav.github.io/wdd231/chamber/styles/larger.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap"

    <script src="/chamber/scripts/date.js" defer></script>

<body>
        <header>
            <img class="logo" src="/chamber/images/site-logo.webp" alt="site logo" width="44" height="44">
            <span>Kingston Chamber of Commerce</span>
            <img class="dark-mode" src="/chamber/images/dark-mode.svg" alt="dark mode icon" width="44" height="44">
            <button id="ham-button" class="hamburger" aria-label="navigation"></button>
            <nav id="nav-bar" class="navigation">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li class="active"><a href="#">Directory</a></li>
                    <li><a href="#">Join</a></li>
                    <li><a href="#">Discover</a></li>
                </ul>
            </nav>
        </header>
    <main>
        <h1>Business Directory</h1>
        <div class="menu">
            <button id="grid">Grid</button>
            <button id="list">List</button>
        </div>
        <article class="grid">
            <div id="cards"></div>
        </article>
    </main>
    <footer>
        <div class="cc-info">
            <p class="bold">Kingston Chamber of Commerce</p>
            <p>26159 Dulay Rd NE</p>
            <p>Kingston, WA 98346</p>
            <p>info@kingstoncc.com</p>
            <p>(360) 867-5309</p>

        </div>
        <div class="socials">
            <img src="/chamber/images/linkedin.svg" alt="linkedin icon" width="44" height="44">
            <img src="/chamber/images/facebook.svg" alt="facebook" width="44" height="44">
            <img src="/chamber/images/instagram.svg" alt="instagram icon" width="44" height="44">
        </div>
        <div class="class-info">
            <p>WDD231 Class Project</p>
            <p>April Cleaver</p>
            <p>©<span id="year"></span> Kingston Chamber of Commerce</p>
