<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingston Chamber of Commerce</title>
    <meta name="author" content="April Cleaver">
    <meta name="description" content="Home page for the Chamber of Commerce project website for WDD 231 at BYU-Idaho">
    <meta property="og:title" content="Welcome to the Kingston Chamber of Commerce">
    <meta property="og:description"
        content="Home page for the Chamber of Commerce project website for WDD 231 at BYU-Idaho">
    <meta property="og:image" content="https://aprcleav.github.io/wdd231/chamber/images/hero.webp">
    <meta property="og:url" content="https://aprcleav.github.io/wdd231/chamber/index.html">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">
    <link rel="icon" href="/chamber/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400..900&display=swap" rel="stylesheet">
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/date.js" defer></script>
</head>

<body>
    <header>
        <img class="logo" src="images/site-logo.webp" alt="site logo" width="44" height="44">
        <span>Kingston Chamber of Commerce</span>
        <img class="dark-mode" src="images/dark-mode.svg" alt="dark mode icon" width="44" height="44">
        <button id="ham-button" class="hamburger" aria-label="navigation"></button>
        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li class="active"><a href="join.html">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Join</h1>
        <form action="" method="get">
            <label for="first">First Name</label>
                <input type="text" id="first" name="first" required autocomplete="given-name" title="First Name">
            <label for="last">Last Name</label>
                <input type="text" id="last" name="last" required autocomplete="family-name" title="Last Name">
            <label for="title">Organizational Title</label>
                <input type="text" id="title" name="title" title="Organizational Title" autocomplete="organization-title" pattern="[A-Za-z\s\-]{7,}">
            <label for="email">Email Address</label>
                <input type="email" id="email" required name="email" title="Email Address" placeholder="hello@email.com" autocomplete="email">
            <label for="phone">Mobile Phone Number</label>
                <input type="tel" required id="phone" name="phone" title="Mobile Phone Number" placeholder="000-000-0000" autocomplete="tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
            <label for="business-name">Name of Business/Organization</label>
                <input type="text" required id="business-name" name="business-name" title="Name of Business/Organization" autocomplete="organization">
            <fieldset>
                <legend>Membership Level</legend>
                <label for="np">NP Membership</label>
                    <input type="radio" id="np" name="np" value="np" checked>
                <label for="bronze">Bronze Membership</label>
                    <input type="radio" id="bronze" name="bronze" value="bronze">
                <label for="silver">Silver Membership</label>
                    <input type="radio" id="silver" name="silver" value="silver">
                <label for="gold">Gold Membership</label>
                    <input type="radio" id="gold" name="gold" value="gold">
            </fieldset>
            <label for="description">Description of Business/Organization</label>
                <textarea name="description" id="description" title="Description of Business/Organization"></textarea>
            <label for="timestamp"></label>
                <input type="hidden" name="timestamp" id="timestamp"> 
            <input type="sumbit" value="Become a Member">

            <!-- Timestamp -->
             <!-- Submit button -->
        </form>
    </main>
    <footer>
        <div class="cc-info">
            <p class="bold">Kingston Chamber of Commerce</p>
            <p>26159 Dulay Rd NE</p>
            <p>Kingston, WA 98346</p>
            <p>info@kingstoncc.com</p>
            <p>(360) 867-5309</p>
        </div>
        <div class="socials">
            <a href="#"><img src="images/linkedin.svg" alt="linkedin icon" width="44" height="44"></a>
            <a href="#"><img src="images/facebook.svg" alt="facebook icon" width="44" height="44"></a>
            <a href="#"><img src="images/instagram.svg" alt="instagram icon" width="44" height="44"></a>
        </div>
        <div class="class-info">
            <p>WDD231 Class Project</p>
            <p>April Cleaver</p>
            <p>©<span id="year"></span> Kingston Chamber of Commerce</p>
            <p>Last Modification: <span id="last-modified"></span></p>
        </div>
    </footer>
</body>

</html>
